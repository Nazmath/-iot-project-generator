<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Project Generator</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-microchip"></i> IoT Project Generator</h1>
            <p>Enter an idea, and I'll build the project guide for you.</p>
        </header>

        <div class="search-box">
            <input type="text" id="userInput" placeholder="e.g., Smart Door Lock using ESP32">
            <button id="generateBtn">Generate <i class="fas fa-paper-plane"></i></button>
        </div>

        <div id="loader" class="hidden">
            <div class="spinner"></div>
            <p>AI Engineer is designing your circuit...</p>
        </div>

        <div id="output" class="hidden"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
